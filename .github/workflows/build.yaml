name: Build

on:
  workflow_call:
    outputs:
      image:
        description: "Docker image pushed to GAR"
        value: ${{ jobs.build.outputs.image }}
    secrets:
      NAIS_WORKLOAD_IDENTITY_PROVIDER:
        required: true

jobs:
  build:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"
      checks: "write"
      pull-requests: "write"
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/wrapper-validation@v6.1.1
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.1
        with:
          gradle-home-cache-cleanup: true
      - name: Build and test
        run: ./gradlew --configuration-cache build installDist
      - name: Publish results (unit test)
        uses: EnricoMi/publish-unit-test-result-action@v2.23.0
        if: (!cancelled())
        with:
          files: "**/build/test-results/test/TEST-*.xml"
      - name: Push docker image to GAR
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: teamdagpenger
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
